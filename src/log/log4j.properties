# On définit deux destinations
log4j.rootLogger=DEBUG, TEXT, WEB

# CONFIGURATION FICHIER TEXTE 
log4j.appender.TEXT=org.apache.log4j.FileAppender
log4j.appender.TEXT.File=logs/game_log.txt
log4j.appender.TEXT.layout=org.apache.log4j.PatternLayout
log4j.appender.TEXT.layout.ConversionPattern=%d{HH:mm:ss} %-5p [%c{1}] %m%n

# CONFIGURATION HTML
log4j.appender.WEB=org.apache.log4j.FileAppender
log4j.appender.WEB.File=logs/game_log.html
log4j.appender.WEB.layout=org.apache.log4j.HTMLLayout
log4j.appender.WEB.layout.Title=Logs du Projet