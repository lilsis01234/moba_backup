log4j.rootLogger=DEBUG, TEXT

# Pour les classes html
log4j.logger.engine.process.EquipmentLoader=DEBUG, WEB
log4j.additivity.engine.process.EquipmentLoader=false
log4j.logger.gui.ShopPanel=DEBUG, SHOP_WEB
log4j.additivity.gui.ShopPanel=false
log4j.logger.gui.ShopPanel=DEBUG, SHOP_WEB
log4j.additivity.gui.Personnage=false

#txt
log4j.appender.TEXT=org.apache.log4j.FileAppender
log4j.appender.TEXT.File=logs/general_logs.txt
log4j.appender.TEXT.layout=org.apache.log4j.PatternLayout
log4j.appender.TEXT.layout.ConversionPattern=%d{HH:mm:ss} %-5p [%c{1}] %m%n

#Log en html d'équipements
log4j.appender.WEB=org.apache.log4j.FileAppender
log4j.appender.WEB.File=logs/equipment_logs.html
log4j.appender.WEB.layout=org.apache.log4j.HTMLLayout
log4j.appender.WEB.layout.Title=Test des Equipements

#Log en html de shop panel
log4j.appender.SHOP_WEB=org.apache.log4j.FileAppender
log4j.appender.SHOP_WEB.File=logs/shoppanel_logs.html
log4j.appender.SHOP_WEB.layout=org.apache.log4j.HTMLLayout
log4j.appender.SHOP_WEB.layout.Title=Logs Achat d'équipements

#Log en html de personnage
log4j.appender.SHOP_WEB=org.apache.log4j.FileAppender
log4j.appender.SHOP_WEB.File=logs/shoppanel_logs.html
log4j.appender.SHOP_WEB.layout=org.apache.log4j.HTMLLayout
log4j.appender.SHOP_WEB.layout.Title=Logs Achat d'équipements